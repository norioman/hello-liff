<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIFF Login Test</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --line-green: #06c755;
      --bg: #f7f8fa;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e3e6eb;
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", "Yu Gothic", sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 16px;
      line-height: 1.5;
    }
    .container { max-width: 560px; margin: 0 auto; }
    h1 { font-size: 20px; margin: 8px 0 16px; }
    h2 { font-size: 15px; margin: 16px 0 8px; color: var(--muted); }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    button {
      display: inline-block;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 4px 4px 0 0;
    }
    button.primary { background: var(--line-green); color: white; }
    button.secondary { background: #eef0f4; color: var(--text); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .avatar { width: 56px; height: 56px; border-radius: 50%; background: #ddd; }
    .name { font-weight: 600; font-size: 16px; }
    .status { font-size: 12px; color: var(--muted); }
    .status.ok { color: var(--line-green); }
    .status.err { color: #d33; }
    pre {
      background: #0f1115;
      color: #d6e1f5;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      overflow-x: auto;
      white-space: pre-wrap;
      word-break: break-all;
      margin: 8px 0 0;
    }
    .kv { font-size: 13px; }
    .kv div { padding: 4px 0; border-bottom: 1px dashed var(--border); }
    .kv div:last-child { border-bottom: none; }
    .kv b { display: inline-block; min-width: 120px; color: var(--muted); font-weight: 500; }
    .point-card { background: linear-gradient(135deg, #06c755, #04a548); color: white; border: none; }
    .point-card h2 { color: rgba(255,255,255,0.85); margin-top: 0; }
    .points-big { font-size: 56px; font-weight: 800; line-height: 1; margin: 8px 0; }
    .points-unit { font-size: 16px; font-weight: 500; opacity: 0.85; margin-left: 6px; }
    .point-meta { font-size: 13px; opacity: 0.9; margin-bottom: 12px; }
    .checkin-btn { background: white; color: var(--line-green); width: 100%; padding: 14px; font-size: 16px; }
    .checkin-btn:disabled { background: rgba(255,255,255,0.6); color: rgba(6,199,85,0.6); }
    .toast { margin-top: 10px; padding: 8px 12px; background: rgba(255,255,255,0.18); border-radius: 6px; font-size: 13px; min-height: 1em; }
  </style>
</head>
<body>
  <div class="container">
    <h1>LIFF Login Test</h1>

    <div class="card">
      <label for="liffId">LIFF ID</label>
      <input type="text" id="liffId" placeholder="1234567890-abcdEFGH" autocomplete="off" />
      <div style="margin-top:8px;">
        <button class="primary" id="btnInit">Initialize LIFF</button>
        <button class="secondary" id="btnLogin" disabled>Login</button>
        <button class="secondary" id="btnLogout" disabled>Logout</button>
      </div>
      <div class="status" id="status">未初期化</div>
    </div>

    <div class="card point-card" id="pointCard" hidden>
      <h2>ポイントカード</h2>
      <div><span class="points-big" id="pointsValue">0</span><span class="points-unit">pt</span></div>
      <div class="point-meta" id="pointMeta">来店履歴なし</div>
      <button class="checkin-btn" id="btnCheckin">来店チェックイン (+1pt)</button>
      <div class="toast" id="checkinToast"></div>
    </div>

    <div class="card" id="profileCard" hidden>
      <h2>Profile</h2>
      <div class="row">
        <img class="avatar" id="picture" alt="" />
        <div>
          <div class="name" id="displayName"></div>
          <div class="status" id="userId"></div>
        </div>
      </div>
      <div class="kv" style="margin-top:12px;">
        <div><b>statusMessage</b><span id="statusMessage"></span></div>
        <div><b>email</b><span id="email"></span></div>
      </div>
    </div>

    <div class="card" id="envCard" hidden>
      <h2>Environment</h2>
      <div class="kv" id="envKv"></div>
    </div>

    <div class="card" id="tokenCard" hidden>
      <h2>Tokens</h2>
      <label>ID Token (decoded)</label>
      <pre id="idToken"></pre>
      <label style="margin-top:8px;">Access Token</label>
      <pre id="accessToken"></pre>
    </div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const STORAGE_KEY = "liffId";

    const setStatus = (msg, kind) => {
      const el = $("status");
      el.textContent = msg;
      el.className = "status" + (kind ? " " + kind : "");
    };

    const DEFAULT_LIFF_ID = "2009931254-QLYpvjDp";
    const POINT_API_URL = "https://script.google.com/macros/s/AKfycbw5j6Ep7HJYq-1T3zd8s2Ybf59Ke4pKEHj4t1mhuN1F4h7cNwH55Tbm57x2O24vO3OROw/exec";
    let currentProfile = null;
    const savedId = localStorage.getItem(STORAGE_KEY);
    const initialId = savedId || DEFAULT_LIFF_ID;
    $("liffId").value = initialId;

    function syncButtons() {
      const loggedIn = liff.isLoggedIn();
      $("btnLogin").disabled = loggedIn;
      $("btnLogout").disabled = !loggedIn;
    }

    async function initLiff(liffId) {
      localStorage.setItem(STORAGE_KEY, liffId);
      setStatus("初期化中…");
      await liff.init({ liffId });
      setStatus("初期化完了", "ok");
      syncButtons();
      renderEnv();
      if (liff.isLoggedIn()) {
        await renderProfile();
      }
    }

    $("btnInit").addEventListener("click", async () => {
      const liffId = $("liffId").value.trim();
      if (!liffId) { setStatus("LIFF IDを入力してください", "err"); return; }
      try {
        await initLiff(liffId);
      } catch (e) {
        setStatus("init失敗: " + (e && e.message ? e.message : e), "err");
      }
    });

    initLiff(initialId).catch((e) => {
      setStatus("init失敗: " + (e && e.message ? e.message : e), "err");
    });

    $("btnLogin").addEventListener("click", () => {
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
      } else {
        setStatus("既にログイン済み", "ok");
      }
    });

    $("btnLogout").addEventListener("click", () => {
      if (liff.isLoggedIn()) {
        liff.logout();
        location.reload();
      }
    });

    function renderEnv() {
      const env = {
        isInClient: liff.isInClient(),
        isLoggedIn: liff.isLoggedIn(),
        os: liff.getOS(),
        language: liff.getLanguage(),
        version: liff.getVersion(),
        lineVersion: liff.getLineVersion(),
        context: liff.getContext && liff.getContext(),
      };
      const wrap = $("envKv");
      wrap.innerHTML = "";
      Object.entries(env).forEach(([k, v]) => {
        const div = document.createElement("div");
        const value = typeof v === "object" ? JSON.stringify(v) : String(v);
        div.innerHTML = "<b>" + k + "</b><span>" + value + "</span>";
        wrap.appendChild(div);
      });
      $("envCard").hidden = false;
    }

    async function renderProfile() {
      try {
        const profile = await liff.getProfile();
        currentProfile = profile;
        $("displayName").textContent = profile.displayName || "";
        $("userId").textContent = profile.userId || "";
        $("statusMessage").textContent = profile.statusMessage || "";
        if (profile.pictureUrl) $("picture").src = profile.pictureUrl;
        try {
          const email = liff.getDecodedIDToken && liff.getDecodedIDToken();
          $("email").textContent = (email && email.email) || "(emailスコープ未許可)";
        } catch { $("email").textContent = "(取得失敗)"; }
        $("profileCard").hidden = false;

        const decoded = liff.getDecodedIDToken && liff.getDecodedIDToken();
        $("idToken").textContent = decoded ? JSON.stringify(decoded, null, 2) : "(なし)";
        $("accessToken").textContent = liff.getAccessToken() || "(なし)";
        $("tokenCard").hidden = false;

        if (POINT_API_URL) {
          $("pointCard").hidden = false;
          await refreshPoints();
        }
      } catch (e) {
        setStatus("profile取得失敗: " + (e && e.message ? e.message : e), "err");
      }
    }

    async function callPointApi(action) {
      const res = await fetch(POINT_API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify({
          action,
          userId: currentProfile.userId,
          displayName: currentProfile.displayName,
        }),
      });
      return res.json();
    }

    async function refreshPoints() {
      try {
        const r = await callPointApi("status");
        if (!r.ok) throw new Error(r.error || "status failed");
        $("pointsValue").textContent = r.points;
        $("pointMeta").textContent = r.lastVisitAt
          ? "最終来店: " + r.lastVisitAt + "（累計 " + r.visitCount + " 回）"
          : "来店履歴なし";
      } catch (e) {
        $("checkinToast").textContent = "ポイント取得失敗: " + e.message;
      }
    }

    $("btnCheckin").addEventListener("click", async () => {
      if (!currentProfile) return;
      const btn = $("btnCheckin");
      btn.disabled = true;
      $("checkinToast").textContent = "送信中…";
      try {
        const r = await callPointApi("checkin");
        if (!r.ok) throw new Error(r.error || "checkin failed");
        $("pointsValue").textContent = r.points;
        $("pointMeta").textContent = "累計 " + r.visitCount + " 回 来店";
        $("checkinToast").textContent = r.message;
      } catch (e) {
        $("checkinToast").textContent = "失敗: " + e.message;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
